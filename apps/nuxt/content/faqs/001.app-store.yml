category: marketing
label: Why can’t I find Pantry Panic in the App Store or Play Store?
content: Pantry Panic is an installable web app, also known as a PWA. That means you use it through your browser, but it can still live on your home screen like a normal app. When your device supports it, Pantry Panic will show an install prompt. If that does not appear, you can usually install it from your browser menu by choosing something like “Add to Home Screen” or “Install app”.