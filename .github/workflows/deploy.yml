name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup node and pnpm
        uses: ./.github/actions/setup

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Build Cloudflare Worker
        run: pnpm --filter @pantrypanic/nuxt run build
        env:
          SKIP_ADMIN_SEED: '1'
          CLOUDFLARE_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_R2_BUCKET: ${{ vars.CLOUDFLARE_R2_BUCKET }}
          CLOUDFLARE_WORKER_NAME: ${{ vars.CLOUDFLARE_WORKER_NAME }}
          NUXT_PUBLIC_SITE_URL: ${{ vars.NUXT_PUBLIC_SITE_URL }}
          NUXT_SESSION_PASSWORD: ${{ secrets.NUXT_SESSION_PASSWORD }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          ENABLE_MULTI_TENANCY: ${{ vars.ENABLE_MULTI_TENANCY }}
          ENABLE_HOUSEHOLD_CREATION: ${{ vars.ENABLE_HOUSEHOLD_CREATION }}
          ENABLE_PUBLIC_REGISTRATION: ${{ vars.ENABLE_PUBLIC_REGISTRATION }}
          ENABLE_BETA_PERIOD: ${{ vars.ENABLE_BETA_PERIOD }}
          ENABLE_MARKETING: ${{ vars.ENABLE_MARKETING }}
          ENABLE_TURNSTILE: ${{ vars.ENABLE_TURNSTILE }}
          TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

      - name: Verify generated Wrangler config
        run: test -f apps/nuxt/.output/server/wrangler.json

      - name: Apply D1 migrations
        run: >-
          pnpm --dir apps/nuxt exec wrangler d1 migrations apply DB --remote --config
          .output/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Cloudflare secret
        run: |
          echo "$NUXT_SESSION_PASSWORD" | pnpm --dir apps/nuxt exec wrangler secret put NUXT_SESSION_PASSWORD --name "${CLOUDFLARE_WORKER_NAME:-pantrypanic}"
        env:
          NUXT_SESSION_PASSWORD: ${{ secrets.NUXT_SESSION_PASSWORD }}
          CLOUDFLARE_WORKER_NAME: ${{ vars.CLOUDFLARE_WORKER_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: pnpm --dir apps/nuxt exec wrangler --cwd .output deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Seed initial admin user
        run: pnpm --filter @pantrypanic/nuxt run seed:admin
        env:
          ADMIN_USER_EMAIL: ${{ secrets.ADMIN_USER_EMAIL }}
          ADMIN_USER_PASSWORD: ${{ secrets.ADMIN_USER_PASSWORD }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          NUXT_PUBLIC_SITE_URL: ${{ vars.NUXT_PUBLIC_SITE_URL }}

      - name: Write deployment summary
        run: |
          {
            echo "## Cloudflare deployment"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Environment: \`${{ inputs.environment }}\`"
            echo "- Worker: \`${CLOUDFLARE_WORKER_NAME}\`"
            echo "- D1 database ID: \`${CLOUDFLARE_D1_DATABASE_ID:0:8}…\`"
            echo "- Site: ${NUXT_PUBLIC_SITE_URL}"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_WORKER_NAME: ${{ vars.CLOUDFLARE_WORKER_NAME }}
          NUXT_PUBLIC_SITE_URL: ${{ vars.NUXT_PUBLIC_SITE_URL }}
